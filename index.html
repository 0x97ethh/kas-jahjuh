<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BUKU KAS JAH-JUH</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📒</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; background: #0a0a0f; }
    .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
    .gradient-text { background: linear-gradient(135deg, #e50914, #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .btn-primary { background: linear-gradient(135deg, #e50914, #ff4444); }
    .btn-primary:hover { background: linear-gradient(135deg, #ff4444, #e50914); }
    .btn-success { background: linear-gradient(135deg, #22c55e, #16a34a); }
    .btn-success:hover { background: linear-gradient(135deg, #16a34a, #22c55e); }
    .month-tab { 
      padding: 10px 20px; 
      border-radius: 12px; 
      font-weight: 600; 
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(255,255,255,0.05);
      color: #a0a0a0;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .month-tab:hover { background: rgba(255,255,255,0.1); }
    .month-tab.active { 
      background: linear-gradient(135deg, #e50914, #ff4444); 
      color: white;
      border-color: transparent;
    }
    .month-tab.completed { 
      background: rgba(34,197,94,0.2); 
      color: #4ade80;
      border-color: rgba(34,197,94,0.3);
    }
    .input-amount { 
      background: rgba(255,255,255,0.05); 
      border: 2px solid rgba(255,255,255,0.1); 
      color: white; 
      text-align: center;
      padding: 12px 8px;
      width: 100%;
      font-size: 16px;
      font-weight: 600;
      border-radius: 12px;
    }
    .input-amount:focus { 
      border-color: #e50914; 
      outline: none; 
      box-shadow: 0 0 0 3px rgba(229,9,20,0.2); 
    }
    .input-amount.has-value {
      background: rgba(34,197,94,0.1);
      border-color: rgba(34,197,94,0.5);
    }
    .member-card { 
      background: rgba(255,255,255,0.03); 
      border: 1px solid rgba(255,255,255,0.05); 
      border-radius: 16px; 
      padding: 16px;
      transition: all 0.2s;
    }
    .member-card:hover { background: rgba(255,255,255,0.05); }
    .member-card.paid { border-color: rgba(34,197,94,0.3); }
    .badge { padding: 4px 12px; border-radius: 9999px; font-size: 11px; font-weight: 600; }
    .badge-green { background: rgba(34,197,94,0.2); color: #4ade80; }
    .badge-red { background: rgba(239,68,68,0.2); color: #f87171; }
    .progress-bar { 
      height: 8px; 
      border-radius: 4px; 
      background: rgba(255,255,255,0.1); 
      overflow: hidden;
    }
    .progress-fill { 
      height: 100%; 
      border-radius: 4px; 
      background: linear-gradient(90deg, #22c55e, #16a34a);
      transition: width 0.5s ease;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1a1a2e; }
    ::-webkit-scrollbar-thumb { background: #e50914; border-radius: 3px; }
    @media print {
      body { background: white; color: black; }
      .no-print { display: none; }
      .glass { background: white; border: 1px solid #ccc; }
    }
  </style>
</head>
<body class="text-white min-h-screen">
  <!-- Header -->
  <header class="glass sticky top-0 z-50 border-b border-white/5">
    <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-2xl">📒</span>
        <div>
          <h1 class="font-bold text-lg">BUKU KAS <span class="gradient-text">JAH-JUH</span></h1>
          <p class="text-xs text-zinc-500">Kelompok Arisan & Simpan Pinjam</p>
        </div>
      </div>
      <div class="flex items-center gap-3 no-print">
        <select id="yearSelect" class="input-amount rounded-lg px-3 py-1.5 text-sm w-auto" onchange="renderAll()">
          <option value="2026">2026</option>
          <option value="2025">2025</option>
        </select>
        <button onclick="exportToCSV()" class="glass rounded-lg px-3 py-1.5 text-sm hover:bg-white/10">📥</button>
        <button onclick="window.print()" class="glass rounded-lg px-3 py-1.5 text-sm hover:bg-white/10">🖨️</button>
        <button onclick="saveData()" class="btn-success px-4 py-1.5 rounded-lg text-sm font-semibold">💾</button>
      </div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-6">
    <!-- Stats Cards -->
    <div class="grid grid-cols-3 gap-4 mb-6">
      <div class="glass rounded-2xl p-4 text-center">
        <div class="text-3xl font-black text-green-400" id="totalKas">Rp 0</div>
        <div class="text-xs text-zinc-400 mt-1">Total Kas</div>
      </div>
      <div class="glass rounded-2xl p-4 text-center">
        <div class="text-3xl font-black text-blue-400" id="paidCount">0/28</div>
        <div class="text-xs text-zinc-400 mt-1">Sudah Bayar</div>
      </div>
      <div class="glass rounded-2xl p-4 text-center">
        <div class="text-3xl font-black text-yellow-400" id="progressPct">0%</div>
        <div class="text-xs text-zinc-400 mt-1">Progress</div>
      </div>
    </div>

    <!-- Progress Bar -->
    <div class="glass rounded-full p-1 mb-6">
      <div class="progress-bar">
        <div class="progress-fill" id="progressBar" style="width: 0%"></div>
      </div>
    </div>

    <!-- Month Tabs -->
    <div class="flex flex-wrap gap-2 mb-6 no-print" id="monthTabs">
    </div>

    <!-- Current Month Header -->
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-2xl font-bold" id="currentMonthTitle">📅 Mei 2026</h2>
      <div class="flex gap-2 no-print">
        <button onclick="prevMonth()" class="glass px-3 py-2 rounded-xl text-sm hover:bg-white/10">◀</button>
        <button onclick="nextMonth()" class="glass px-3 py-2 rounded-xl text-sm hover:bg-white/10">▶</button>
      </div>
    </div>

    <!-- Quick Fill -->
    <div class="glass rounded-2xl p-4 mb-6 no-print">
      <div class="flex items-center gap-4">
        <input type="number" id="quickAmount" placeholder="Masukkan jumlah iuran..." class="input-amount flex-1" value="50000">
        <button onclick="fillCurrentMonth()" class="btn-primary px-6 py-3 rounded-xl font-semibold whitespace-nowrap">💰 Isi Semua</button>
      </div>
    </div>

    <!-- Members Grid -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="membersGrid">
    </div>

    <!-- Month Summary -->
    <div class="glass rounded-2xl p-4 mt-6">
      <h3 class="font-semibold mb-3">📊 Ringkasan Bulan <span id="summaryMonth">Mei</span></h3>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <div class="text-sm text-zinc-400">Total Terkumpul</div>
          <div class="text-xl font-bold text-green-400" id="monthTotal">Rp 0</div>
        </div>
        <div>
          <div class="text-sm text-zinc-400">Sudah Bayar</div>
          <div class="text-xl font-bold text-blue-400" id="monthPaid">0/28</div>
        </div>
      </div>
    </div>

    <!-- All Months Summary -->
    <div class="glass rounded-2xl p-4 mt-6 no-print">
      <h3 class="font-semibold mb-3">📈 Ringkasan Semua Bulan</h3>
      <div class="space-y-3" id="allMonthsSummary">
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-white/5 py-6 mt-10 text-center text-zinc-600 text-xs">
    <p>📒 BUKU KAS JAH-JUH — Kelompok Arisan & Simpan Pinjam</p>
    <p class="mt-1">Data tersimpan di browser • Auto-save aktif</p>
  </footer>

  <script>
    // ========== CONFIG ==========
    const STORAGE_KEY = 'buku-kas-jahjuh';
    const MONTHS = ['Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
    const MEMBERS = [
      'ALI', 'ADE', 'ADIB', 'ADIP', 'AHIS', 'ADNAN', 'ALPIN', 'AMAD',
      'ALWI', 'ARIP', 'ANWAR', 'ARWANI', 'ARKAN', 'BADI', 'DENI', 'JIDAN',
      'JIKIN', 'MEKI', 'PIUL', 'RISKI', 'FAHMI', 'ROSIDIN', 'YUSUP', 'LIHIN',
      'SAMSUL', 'ULUL', 'HANIP', 'IRHAS'
    ];

    // ========== STATE ==========
    let data = {};
    let currentMonthIndex = 0;

    // ========== DATA ==========
    function loadData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        data = JSON.parse(saved);
      } else {
        data = {};
        MEMBERS.forEach(name => {
          data[name] = {};
          MONTHS.forEach(month => {
            data[name][month] = 0;
          });
        });
        saveData();
      }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      showToast('Data berhasil disimpan! 💾');
    }

    // ========== FORMAT ==========
    function formatRp(num) {
      if (!num || num === 0) return 'Rp 0';
      return 'Rp ' + Number(num).toLocaleString('id-ID');
    }

    // ========== RENDER ==========
    function renderMonthTabs() {
      const container = document.getElementById('monthTabs');
      let html = '';
      
      MONTHS.forEach((month, i) => {
        const paidCount = MEMBERS.filter(name => (data[name] && data[name][month]) > 0).length;
        const isComplete = paidCount === MEMBERS.length;
        const isActive = i === currentMonthIndex;
        
        let classes = 'month-tab';
        if (isActive) classes += ' active';
        else if (isComplete) classes += ' completed';
        
        html += `<button class="${classes}" onclick="selectMonth(${i})">
          ${month}
          ${isComplete ? ' ✅' : ` <span class="text-xs opacity-70">${paidCount}/${MEMBERS.length}</span>`}
        </button>`;
      });
      
      container.innerHTML = html;
    }

    function renderMembers() {
      const month = MONTHS[currentMonthIndex];
      const container = document.getElementById('membersGrid');
      let html = '';
      
      MEMBERS.forEach((name, i) => {
        const value = (data[name] && data[name][month]) || 0;
        const hasValue = value > 0;
        
        html += `<div class="member-card ${hasValue ? 'paid' : ''}">
          <div class="flex items-center justify-between mb-2">
            <span class="font-semibold text-sm">${name}</span>
            <span class="badge ${hasValue ? 'badge-green' : 'badge-red'}">${hasValue ? '✅' : '❌'}</span>
          </div>
          <input type="number" 
            class="input-amount ${hasValue ? 'has-value' : ''}" 
            value="${value || ''}" 
            placeholder="0"
            onchange="updateValue('${name}', this.value)"
            onfocus="this.select()"
          >
        </div>`;
      });
      
      container.innerHTML = html;
    }

    function renderStats() {
      const month = MONTHS[currentMonthIndex];
      let totalKas = 0;
      let paidCount = 0;
      let monthTotal = 0;
      let monthPaid = 0;
      
      // All months total
      MEMBERS.forEach(name => {
        MONTHS.forEach(m => {
          totalKas += (data[name] && data[name][m]) || 0;
        });
      });
      
      // Current month
      MEMBERS.forEach(name => {
        const val = (data[name] && data[name][month]) || 0;
        if (val > 0) {
          monthPaid++;
          monthTotal += val;
        }
      });
      
      // Total paid across all months
      MEMBERS.forEach(name => {
        MONTHS.forEach(m => {
          if ((data[name] && data[name][m]) > 0) paidCount++;
        });
      });
      
      const totalSlots = MEMBERS.length * MONTHS.length;
      const progressPct = totalSlots > 0 ? Math.round(paidCount / totalSlots * 100) : 0;
      
      document.getElementById('totalKas').textContent = formatRp(totalKas);
      document.getElementById('paidCount').textContent = `${monthPaid}/${MEMBERS.length}`;
      document.getElementById('progressPct').textContent = `${progressPct}%`;
      document.getElementById('progressBar').style.width = `${progressPct}%`;
      
      document.getElementById('currentMonthTitle').textContent = `📅 ${month} ${document.getElementById('yearSelect').value}`;
      document.getElementById('summaryMonth').textContent = month;
      document.getElementById('monthTotal').textContent = formatRp(monthTotal);
      document.getElementById('monthPaid').textContent = `${monthPaid}/${MEMBERS.length}`;
    }

    function renderAllMonthsSummary() {
      const container = document.getElementById('allMonthsSummary');
      let html = '';
      
      MONTHS.forEach((month, i) => {
        let monthTotal = 0;
        let monthPaid = 0;
        
        MEMBERS.forEach(name => {
          const val = (data[name] && data[name][month]) || 0;
          if (val > 0) {
            monthPaid++;
            monthTotal += val;
          }
        });
        
        const pct = Math.round(monthPaid / MEMBERS.length * 100);
        
        html += `<div class="flex items-center gap-4 p-3 rounded-xl bg-white/3 cursor-pointer hover:bg-white/5" onclick="selectMonth(${i})">
          <span class="font-semibold w-24">${month}</span>
          <div class="flex-1 progress-bar">
            <div class="progress-fill" style="width: ${pct}%"></div>
          </div>
          <span class="text-sm text-zinc-400 w-16 text-right">${monthPaid}/${MEMBERS.length}</span>
          <span class="text-sm font-semibold text-green-400 w-24 text-right">${formatRp(monthTotal)}</span>
        </div>`;
      });
      
      container.innerHTML = html;
    }

    function renderAll() {
      renderMonthTabs();
      renderMembers();
      renderStats();
      renderAllMonthsSummary();
    }

    // ========== ACTIONS ==========
    function selectMonth(index) {
      currentMonthIndex = index;
      renderAll();
    }

    function prevMonth() {
      if (currentMonthIndex > 0) {
        currentMonthIndex--;
        renderAll();
      }
    }

    function nextMonth() {
      if (currentMonthIndex < MONTHS.length - 1) {
        currentMonthIndex++;
        renderAll();
      }
    }

    function updateValue(name, value) {
      const month = MONTHS[currentMonthIndex];
      if (!data[name]) data[name] = {};
      data[name][month] = parseInt(value) || 0;
      
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      renderAll();
    }

    function fillCurrentMonth() {
      const month = MONTHS[currentMonthIndex];
      const amount = parseInt(document.getElementById('quickAmount').value);
      
      if (!amount || isNaN(amount)) {
        alert('Masukkan jumlah iuran yang valid!');
        return;
      }
      
      if (!confirm(`Isi semua anggota bulan ${month} sebesar ${formatRp(amount)}?`)) return;
      
      MEMBERS.forEach(name => {
        if (!data[name]) data[name] = {};
        data[name][month] = amount;
      });
      
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      renderAll();
      showToast(`Berhasil isi ${MEMBERS.length} anggota! ✅`);
    }

    // ========== EXPORT ==========
    function exportToCSV() {
      let csv = 'No,Nama,' + MONTHS.join(',') + ',Total\n';
      
      MEMBERS.forEach((name, i) => {
        let total = 0;
        let values = MONTHS.map(month => {
          const val = (data[name] && data[name][month]) || 0;
          total += val;
          return val;
        });
        
        csv += `${i + 1},${name},${values.join(',')},${total}\n`;
      });
      
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `buku-kas-jahjuh-${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
      URL.revokeObjectURL(url);
      
      showToast('File CSV berhasil didownload! 📥');
    }

    // ========== TOAST ==========
    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'fixed bottom-4 right-4 bg-green-500 text-white px-6 py-3 rounded-xl shadow-lg z-50';
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s';
        setTimeout(() => toast.remove(), 300);
      }, 2000);
    }

    // ========== INIT ==========
    loadData();
    renderAll();
    
    // Auto-save every 30 seconds
    setInterval(() => {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }, 30000);
  </script>
</body>
</html>
